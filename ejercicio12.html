<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ejercicio 12 - Conversor de MXN a USD</title>
  <link rel="stylesheet" href="css/ejercicio12.css">
</head>
<body>

  <h2>Conversor de Pesos Mexicanos a Dólares</h2>

  <label for="mxn">Cantidad en pesos (MXN):</label>
  <input type="text" id="mxn" placeholder="Ej. 500">

  <br>
  <button id="btnConvertir">Convertir</button>
  <br>

  <label for="usd">Resultado en dólares (USD):</label>
  <input type="text" id="usd" readonly>

  <p id="error"></p>

  <script src="js/ejercicio12.js"></script>
</body>
</html>
