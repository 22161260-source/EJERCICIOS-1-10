<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ejercicio 14 - Mayor, Menor y Promedio</title>
  <link rel="stylesheet" href="css/ejercicio14.css">
</head>
<body>

  <h2>Calculadora de Mayor, Menor y Promedio</h2>

  <label for="numeros">Ingresa varios números separados por comas:</label>
  <input type="text" id="numeros" placeholder="Ej. 10, 20, 30, 40, 50">

  <br>
  <button id="btnCalcular">Calcular</button>
  <br>

  <label for="mayor">Número mayor:</label>
  <input type="text" id="mayor" readonly>

  <br>

  <label for="menor">Número menor:</label>
  <input type="text" id="menor" readonly>

  <br>

  <label for="promedio">Promedio:</label>
  <input type="text" id="promedio" readonly>

  <p id="error"></p>

  <script src="js/ejercicio14.js"></script>
</body>
</html>
