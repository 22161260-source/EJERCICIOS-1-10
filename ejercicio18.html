<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manipulación del DOM</title>

   
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

   
    <link rel="stylesheet" href="css/ejercicio18.css">
</head>

<body>

    <div class="container mt-5">

        <div class="card shadow">

            <div class="card-header bg-primary text-white text-center">
                <h2>Agregar y Eliminar Elementos</h2>
            </div>

            <div class="card-body">

                <input type="text" id="nuevoElemento" class="form-control mb-3"
                    placeholder="Escribe un elemento">

                <button id="agregarBtn" class="btn btn-success mb-3">
                    Agregar
                </button>

                <ul id="lista" class="list-group"></ul>

            </div>

        </div>

    </div>

    <script src="js/ejercicio18.js"></script>

</body>

</html>
