<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ejercicio 15 - Calificaciones de Estudiantes</title>
  <link rel="stylesheet" href="css/ejercicio15.css">
</head>
<body>

  <h2>Calificaciones de Estudiantes</h2>
  <label for="nombre">Nombre del estudiante:</label>
  <input type="text" id="nombre" placeholder="Ej. Juan">
  <br>
  <label for="calificacion">Calificación:</label>
  <input type="text" id="calificacion" placeholder="Ej. 85">
  <br>
  <button id="btnAgregar">Agregar estudiante</button>
  <button id="btnCalcular">Calcular</button>
  <br>
  <p id="error"></p>
  <h3>Estudiantes agregados:</h3>
  <ul id="listaEstudiantes"></ul>
  <label for="promedio">Calificación promedio:</label>
  <input type="text" id="promedio" readonly>
  <br>
  <label for="masAlta">Estudiante con la calificación más alta:</label>
  <input type="text" id="masAlta" readonly>
  <br>
  <label for="masBaja">Estudiante con la calificación más baja:</label>
  <input type="text" id="masBaja" readonly>
  <script src="js/ejercicio15.js"></script>
</body>
</html>
